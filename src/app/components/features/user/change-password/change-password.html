<div class="card-siq change-password-card">
  <div class="section-header">
    <h3 class="section-title">Change Password</h3>
  </div>

  @if (successMessage()) {
  <div class="success-message-siq">{{ successMessage() }}</div>
  }
  @if (errorMessage()) {
  <div class="error-message-siq">{{ errorMessage() }}</div>
  }

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label class="form-label-siq">Current Password</label>
      <input type="password" formControlName="oldPassword" class="form-input-siq" placeholder="Current password">
    </div>

    <div class="form-group">
      <label class="form-label-siq">New Password</label>
      <input type="password" formControlName="newPassword" class="form-input-siq" placeholder="Minimum 8 characters">
    </div>

    <div class="form-group">
      <label class="form-label-siq">Confirm New Password</label>
      <input type="password" formControlName="confirmPassword" class="form-input-siq"
        placeholder="Confirm new password">

      @if (passwordForm.errors?.['mismatch'] && passwordForm.get('confirmPassword')?.touched) {
      <small class="error-text-siq">Passwords do not match</small>
      }
    </div>

    <button type="submit" class="btn-siq" [disabled]="passwordForm.invalid || isLoading()">
      {{ isLoading() ? 'Updating...' : 'Update Password' }}
    </button>
  </form>
</div>
