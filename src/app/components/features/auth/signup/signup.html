<div class="auth-container">
  <div class="auth-card animate-in">
    <div class="auth-header">
      <h2 class="page-title">Create Account</h2>
      <p class="text-muted-siq">Join ShopIQ and start shopping today</p>
    </div>

    @if (errorMessage) {
    <div class="error-message-siq">
      {{ errorMessage }}
    </div>
    }

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label-siq">Full Name</label>
        <input type="text" formControlName="name" class="form-input-siq" placeholder="Amir Alsayed">
      </div>

      <div class="form-group">
        <label class="form-label-siq">Email Address</label>
        <input type="email" formControlName="email" class="form-input-siq" placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label class="form-label-siq">Password</label>
        <input type="password" formControlName="password" class="form-input-siq" placeholder="••••••••">
      </div>

      <div class="form-group">
        <label class="form-label-siq">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="form-input-siq" placeholder="••••••••">
        @if (signupForm.errors?.['passwordMismatch'] && signupForm.get('confirmPassword')?.touched) {
        <small class="error-text-siq">Passwords do not match</small>
        }
      </div>

      <button type="submit" class="btn-siq w-full" [disabled]="signupForm.invalid">
        Create Account
      </button>
    </form>

    <div class="divider-text"><span>OR</span></div>

    <button type="button" (click)="continueWithGoogle()" class="btn-outline-siq w-full google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
      Continue with Google
    </button>

    <p class="auth-footer">
      Already have an account? <a routerLink="/auth/login" class="text-primary-siq">Log in</a>
    </p>
  </div>
</div>
