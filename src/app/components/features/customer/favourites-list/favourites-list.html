<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">My Favorites</h2>
        <span class="pill pill-info">{{ favorites.length }} Items</span>
    </div>

    @if(loading) {
    <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted-siq mt-2">Loading your collection...</p>
    </div>
    } @else if (favorites.length === 0) {
    <div class="card-siq text-center py-5">
        <div class="mb-3" style="font-size: 48px;">💝</div>
        <h3 class="section-title">Your wishlist is empty</h3>
        <p class="text-muted-siq mb-4">Save items you love to find them easily later.</p>
        <button class="btn-siq px-5" routerLink="/products">Start Shopping</button>
    </div>
    } @else {
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        @for (fav of favorites; track fav._id) {
        @if (fav.productId) {
        <div class="col d-flex">
            <app-product-card
                class="w-100"
                [product]="asProduct(fav)"
                [quantity]="cartQty.get(fav.productId._id!) ?? 0"
                [favorited]="true"
                (cartUpdated)="syncCart()"
                (favoriteToggled)="loadFavorites()"
            />
        </div>
        }
        }
    </div>
    }
</div>
