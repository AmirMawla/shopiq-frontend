<div class="container-fluid px-4 py-4">

  <div class="section-header">
    <h1 class="page-title">Products</h1>
  </div>

  <div class="card-siq mb-4">
    <div class="row g-3">
      <div class="col-md-5">
        <label class="form-label-siq">Search</label>
        <div class="topbar-search w-100">
          <input type="text" placeholder="Search products..." [(ngModel)]="searchQuery" (input)="applyFilters()" />
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label-siq">Category</label>
        <select class="form-input-siq" [(ngModel)]="selectedCategoryId" (change)="applyFilters()">
          <option value="">All Categories</option>
          @for(cat of categories; track cat._id){
            <option [value]="cat._id">{{ cat.name }}</option>
          }
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label-siq">Max Price</label>
          <input type="number" class="form-input-siq" placeholder="Max price" [(ngModel)]="maxPrice" (input)="applyFilters()"/>
      </div>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-4 g-3">
     @for(p of products; track p._id){
      <div class="col">
        <div class="product-card" (click)="navigateToDetails(p._id!)" style="position: relative;">
          
          <button 
            class="btn-fav-floating" 
            [class.active]="isProductFavorited(p._id!)" 
            (click)="toggleFavorite($event, p._id!)"
            aria-label="Toggle Favorite">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </button>

          <img [src]="p.imageUrl" class="product-card-img" alt="{{ p.name }}">
          <div class="product-card-body">
            <p class="product-card-category">{{ $any(p.categoryId)?.name || p.categoryId }}</p>
            <p class="product-card-name">{{ p.name }}</p>
            <div class="d-flex align-items-center justify-content-between">
              <span class="product-card-price">${{ p.price }}</span>
              @if(p.stock == 0){
                <span class="pill pill-cancelled">Out of Stock</span>
              } @else if(p.stock <= 5){
                <span class="pill pill-processing">Almost Out</span>
              } @else {
              <span class="pill pill-active">In Stock</span>
              }
          </div>
        </div>
      </div>
    </div>
    }

    @empty {
      <div class="col-12 text-center py-5">
        <p class="text-muted-siq">
          @if (loading) { Loading... } @else { No products found }
        </p>
      </div>
    }
  </div>

</div>
