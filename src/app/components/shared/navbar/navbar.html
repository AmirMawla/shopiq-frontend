<nav class="navbar-siq" [class.scrolled]="scrolled()">
  <div class="navbar-container">

    <!-- Logo -->
    <a routerLink="/" class="navbar-logo" (click)="closeMenu()">
      <span class="siq-logo-mark" aria-hidden="true">
        <i class="fa-solid fa-bag-shopping"></i>
        <i class="fa-solid fa-bolt siq-mark-bolt"></i>
      </span>
      <span class="siq-logo-word">SHOP<span>IQ</span></span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="navbar-links">
      <li>
        <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{ exact: true }">
          Home
        </a>
      </li>
      <li><a routerLink="/shop" routerLinkActive="nav-active">Shop</a></li>
      <li class="nav-dropdown">
        <a href="#" (click)="$event.preventDefault()">
          Categories <i class="fa-solid fa-chevron-down"></i>
        </a>
        <div class="dropdown-menu-siq">
          <a routerLink="/shop" [queryParams]="{ category: 'electronics' }">Electronics</a>
          <a routerLink="/shop" [queryParams]="{ category: 'fashion' }">Fashion</a>
          <a routerLink="/shop" [queryParams]="{ category: 'home' }">Home & Living</a>
          <a routerLink="/shop" [queryParams]="{ category: 'beauty' }">Beauty</a>
          <a routerLink="/shop" [queryParams]="{ category: 'sports' }">Sports</a>
        </div>
      </li>
      <li><a routerLink="/shop" [queryParams]="{ deals: 'true' }">Deals</a></li>
    </ul>

    <!-- Right Actions -->
    <div class="navbar-actions">

      <!-- Search -->
      <a routerLink="/search" class="nav-icon-btn" title="Search">
        <i class="fa-solid fa-magnifying-glass"></i>
      </a>

      <!-- Wishlist -->
      <a routerLink="/account/wishlist" class="nav-icon-btn" title="Wishlist">
        <i class="fa-solid fa-heart"></i>
      </a>

      <!-- Cart -->
      <a routerLink="/cart" class="nav-icon-btn cart-btn" title="Cart">
        <i class="fa-solid fa-bag-shopping"></i>
        @if (cartCount > 0) {
          <span class="cart-badge">{{ cartCount }}</span>
        }
      </a>

      <!-- Auth Buttons (guest placeholder) -->
      <a routerLink="/auth/login" class="btn-siq" style="padding: 7px 16px; font-size: 13px;">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </a>
      <a routerLink="/auth/register" class="btn-outline-siq" style="padding: 7px 16px; font-size: 13px;">
        <i class="fa-solid fa-user-plus"></i> Register
      </a>

      <!-- Mobile Hamburger -->
      <button class="hamburger" (click)="toggleMenu()" aria-label="Menu">
        <i class="fa-solid" [class.fa-bars]="!menuOpen()" [class.fa-xmark]="menuOpen()"></i>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      <a routerLink="/" (click)="closeMenu()">Home</a>
      <a routerLink="/shop" (click)="closeMenu()">Shop</a>
      <a routerLink="/shop" (click)="closeMenu()">Categories</a>
      <a routerLink="/shop" (click)="closeMenu()">Deals</a>
      <a routerLink="/cart" (click)="closeMenu()">Cart ({{ cartCount }})</a>
      <a routerLink="/auth/login" (click)="closeMenu()">Login</a>
      <a routerLink="/auth/register" (click)="closeMenu()">Register</a>
    </div>
  }
</nav>
